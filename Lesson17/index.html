        // Ví dụ 2: bieuThuc = 1/n + 2/n + ... + n/n
        function tinhBieuThuc(n) {
            let result = 0;
            for (let i = 1; i <= n; i++) {
                result += i/n;
            }
            return result;
        }

        let n;

        do {
            n = prompt("Nhập vào số n: ");
            n = parseInt(n);
            if(n <= 0) {
                console.log("Vui lòng nhập số lớn hơn 0.");
            } else {
                let result = tinhBieuThuc(n);
                console.log(result);
                
            }
        } while (n <= 0);
