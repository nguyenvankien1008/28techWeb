<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button onclick = "openTab()">Mở tab mới</button>


    <script>
        // BOM: Browser Object Model
        // window: 1 phương thức cao nhất, chứa các object
        console.log(window);

        // Chiều cao, rộng của viewport
        console.log(window.innerHeight);
        console.log(window.innerWidth);
        
        function openTab() {
            window.open("http://127.0.0.1:5500/Lesson18/28tech.html", 
                "_blank",
                "width=1200, height=600, top=200, left=300"
            );
        }
        
    </script>
</body>
</html>
