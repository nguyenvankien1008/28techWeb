<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="login()">Đăng nhập</button>
    <button onclick="updateInfo()">Cập nhật thông tin</button>
    <button onclick="deleteInfo()">Xóa thông tin</button>


    <script>
        function setCookie(cname, cvalue, exdays) {
            var d = new Date();
            d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
            var expires = "expires=" + d.toUTCString();
            document.cookie = cname + "=" + cvalue + "; " + expires;
        }

        function getCookie(cname) {
            var name = cname + "=";
            var ca = document.cookie.split(";");
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i];
                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "";
        }

        function deleteCookie(cname) {
            document.cookie = `${cname}=; expires=Fri, 03 April 2026 09:53:00 UTC`;
        }

        function login() {
            if(true) {
                // Tạo cookie
                // document.cookie = 'token=jjkjHJHdxfcgvgmkhiyhG; expires= Fri, 03 April 2026 22:30:00 UTC';
                // document.cookie = 'email=emailacuanah@gmail.com';
                // document.cookie = 'fullName=Nguyễn Văn Kiên';

                setCookie("token", "jjkjHJHdxfcgvgmkhiyhG", 1);
                setCookie("email", "emailacuanah@gmail.com", 1);
                setCookie("fullName", "Nguyễn Văn Kiên", 1);
            }
        }

        // Lấy cookie
        let allCookie = document.cookie;
        console.log(allCookie);
        
        let email = getCookie("email");
        let token = getCookie("token");
        console.log(email);
        console.log(token);

        // Sửa cookie
        function updateInfo() {
            document.cookie = "email=test@gmail.com";

        // Xóa cookie

            // document.cookie = "token=; expires=Fri, 03 April 2026 09:53:00 UTC";
            // document.cookie = "email=; expires=Fri, 03 April 2026 09:53:00 UTC";
            // document.cookie = "fullName=; expires=Fri, 03 April 2026 09:53:00 UTC";

            deleteCookie("token");
            deleteCookie("email");
            deleteCookie("fullName");
        }
        
        
        
    </script>
</body>
</html>
